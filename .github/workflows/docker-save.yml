name: Docker Image Packer to Gitee

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 腾出空间
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

      # 2. 拉取并打包
      - name: Pull and Save Docker Image
        run: |
          docker pull openwebui/open-webui:latest
          # 建立一个叫 target 的临时文件夹用来装推送到 Gitee 的东西
          mkdir target
          docker save openwebui/open-webui:latest | gzip > target/openwebui.tar.gz

      # 3. 绕过 Gitee 的单文件大尺寸限制并强行推送
      - name: Push to Gitee
        env:
          GITEE_USER: ${{ secrets.GITEE_USER }}
          GITEE_PASS: ${{ secrets.GITEE_PASS }}
        run: |
          cd target
          git init
          
          # === 核心修复：用 Python 自动将账号密码进行安全 URL 编码 ===
          ENCODED_USER=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${GITEE_USER}'))")
          ENCODED_PASS=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${GITEE_PASS}'))")
          
          # === 这样拼接出来的 URL 绝对合法，且带有完整的鉴权权限，无需额外读取凭据 ===
          # ⚠️ 请将下面 URL 末尾的 mesbowdon/openwebui-package.git 替换为你真实的 Gitee 路径 ⚠️
          git remote add origin https://${ENCODED_USER}:${ENCODED_PASS}@gitee.com/mesbowdon/openwebui-package.git
          
          git branch -M main
          git add openwebui.tar.gz
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git commit -m "delivery: openwebui image package"
          
          echo "=== 开始向 Gitee 发起冲击，大包全全速上传中 ==="
          git push -f origin main
          echo "=== 传输完毕！请回到国内网络享受极速下载 ==="